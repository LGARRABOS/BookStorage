name: Setup Go environment
description: Set up Go toolchain with optional dependency download

inputs:
  go-version:
    description: Go version to install
    required: false
    default: "1.22.x"
  download-deps:
    description: Run go mod download after setup
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Download dependencies
      if: ${{ inputs.download-deps == 'true' }}
      shell: bash
      run: go mod download
