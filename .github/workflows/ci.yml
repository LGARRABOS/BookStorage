name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22.x"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Go environment
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}
          download-deps: "false"

      - name: Check formatting (gofmt)
        run: |
          set -e
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Go files not formatted:"
            echo "$files"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Go environment
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  race-tests:
    name: Race condition tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Go environment
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with -race
        run: go test -race ./...

  build:
    name: Build Linux binary
    runs-on: ubuntu-latest
    needs:
      - tests
      - race-tests
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Go environment
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Linux binary
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: go build -o bookstorage ./cmd/bookstorage

      - name: Upload CI binary
        uses: actions/upload-artifact@v4
        with:
          name: bookstorage-ci-linux-amd64
          path: bookstorage

  smoke-http:
    name: HTTP smoke tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Download CI binary
        uses: actions/download-artifact@v4
        with:
          name: bookstorage-ci-linux-amd64
          path: .

      - name: Start application
        env:
          BOOKSTORAGE_HOST: 127.0.0.1
          BOOKSTORAGE_PORT: 5000
          BOOKSTORAGE_DATABASE: /tmp/bookstorage-ci.db
          BOOKSTORAGE_SECRET_KEY: ci-secret-key-for-smoke-tests
        run: |
          set -e
          chmod +x ./bookstorage
          ./bookstorage &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT
          echo "App PID: $APP_PID"
          # Wait for the server to start (polling, up to 60s)
          READY=0
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:5000/ >/dev/null 2>&1; then
              READY=1
              echo "Server ready after ${i} attempts"
              break
            fi
            echo "Waiting for server to be ready... ($i/30)"
            sleep 2
          done

          if [ "${READY}" != "1" ]; then
            echo "Server did not start in 60s"
            exit 1
          fi

          # Basic smoke tests
          curl -sSf http://127.0.0.1:5000/ >/dev/null
          curl -sSf http://127.0.0.1:5000/login >/dev/null
          curl -sSf http://127.0.0.1:5000/register >/dev/null

