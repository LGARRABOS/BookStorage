name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (e.g. production, staging)"
        required: false
        default: "production"

permissions:
  contents: read

jobs:
  build-and-package:
    name: Build and package Linux binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build Linux binary (CGO enabled)
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o bookstorage ./cmd/bookstorage

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp bookstorage dist/
          tr -d '\r' < scripts/bsctl > dist/bsctl
          chmod +x dist/bsctl
          cp deploy/bookstorage.service dist/
          tar -czf bookstorage-linux-amd64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bookstorage-linux-amd64
          path: bookstorage-linux-amd64.tar.gz

